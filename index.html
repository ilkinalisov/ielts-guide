<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IELTS Writing Task 2 — Guide</title>
  <meta name="description" content="A practical, multi-section guide to IELTS Writing Task 2." />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body data-theme="light">

  <!-- view toggle (top-left) -->
  <div class="viewtoggle" id="viewToggle" role="tablist" aria-label="View mode">
    <button data-mode="read" class="vt-btn" role="tab">Read</button>
    <button data-mode="scans" class="vt-btn" role="tab">Scans</button>
  </div>

  <!-- persistent top-right controls (minimal) -->
  <div class="controls">
    <button id="searchBtn" class="ctrl-btn" aria-label="Search">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button id="themeBtn" class="ctrl-btn" aria-label="Toggle light/dark">
      <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4.4" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M5.2 5.2l1.5 1.5M17.3 17.3l1.5 1.5M18.8 5.2l-1.5 1.5M6.7 17.3l-1.5 1.5"/></g></svg>
    </button>
  </div>

  <!-- router mounts here -->
  <div id="app"></div>

  <!-- search overlay -->
  <div id="searchOverlay" class="search-overlay" hidden>
    <div class="search-card" role="dialog" aria-label="Search the guide">
      <div class="search-head">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchField" type="search" placeholder="Search all sections…" autocomplete="off" spellcheck="false" />
        <kbd>esc</kbd>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <script src="content.js?v=5"></script>
  <script src="scans.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
